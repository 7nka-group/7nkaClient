<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Launcher</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f5f5f5;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        display:flex;
        gap:30px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .card{
        width:300px;
        background:white;
        border:1px solid #ddd;
        border-radius:10px;
        padding:20px;
        text-align:center;
    }

    .game-image{
        width:100%;
        height:180px;
        object-fit:cover;
        border-radius:8px;
        margin-bottom:15px;
        background:#ddd;
    }

    h2{
        margin-bottom:15px;
    }

    .btn{
        display:block;
        width:100%;
        padding:12px;
        background:#0078ff;
        color:white;
        text-decoration:none;
        border-radius:6px;
        font-weight:bold;
        cursor:pointer;
    }

    .btn:hover{
        opacity:0.9;
    }
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <img src="fivem.jpg" alt="FiveM" class="game-image">
        <h2>FiveM</h2>
        <a href="#" class="btn">Coming soon</a>
    </div>

    <div class="card">
        <img src="minecraft.webp" alt="Minecraft" class="game-image">
        <h2>Minecraft</h2>
        <a href="#" class="btn">Coming soon</a>
    </div>

</div>

<script>
// JavaScript placeholder
</script>

</body>
</html>
